name: CourseBuilder
options:
  bundleIdPrefix: golf.spot
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  CourseBuilder:
    type: application
    platform: macOS
    sources:
      - CourseBuilder
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: CourseBuilder/Resources/CourseBuilder.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSLocationUsageDescription: "CourseBuilder uses your location for course distance verification"
    scheme:
      testTargets:
        - CourseBuilderTests
  CourseBuilderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CourseBuilderTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CourseBuilder
